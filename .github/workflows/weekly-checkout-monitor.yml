name: Weekly checkout monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture checkout screenshots
        run: npm run capture:weekly

      - name: Commit captured screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automated-captures
          if git diff --cached --quiet; then
            echo "No new checkout monitor captures to commit."
          else
            git commit -m "Add weekly checkout monitor captures"
            git push
          fi
