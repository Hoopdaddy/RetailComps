<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoop's Cart and Checkout PM Workbench</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Workspace navigation">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">TS</span>
          <div>
            <p>Tractor Supply</p>
            <h1>Hoop's Cart and Checkout PM Workbench</h1>
          </div>
        </div>

        <nav class="mode-nav" aria-label="Views">
          <button type="button" data-view="overview" class="active">Overview</button>
          <button type="button" data-view="captures">Captures</button>
          <button type="button" data-view="matrix">Feature Matrix</button>
          <button type="button" data-view="reports">Reports</button>
        </nav>

        <div class="sidebar-section">
          <div class="sidebar-heading">
            <span>Retailers</span>
            <button type="button" class="icon-button" id="resetOrderButton" title="Reset retailer order" aria-label="Reset retailer order">R</button>
          </div>
          <div class="retailer-list" id="retailerList"></div>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Cart and checkout competitive monitoring</p>
            <h2 id="pageHeading">PM command center</h2>
          </div>
          <div class="topbar-actions">
            <button type="button" class="secondary-action" id="importButton">Import</button>
            <input id="importFile" type="file" accept="application/json" hidden>
            <button type="button" class="secondary-action" id="exportButton">Export</button>
          </div>
        </header>

        <section id="viewShell" class="view-shell" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="data.js"></script>
    <script src="automated-captures.js"></script>
    <script src="views.js"></script>
    <script src="app.js"></script>
  </body>
</html>
