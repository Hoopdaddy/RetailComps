<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hoop's Cart and Checkout PM Workbench</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      .topbar-title {
        min-width: 0;
      }

      .mission-moment {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .mission-moment strong {
        flex: 0 0 auto;
        border: 1px solid #f1c9cf;
        border-radius: 999px;
        background: #fff3f5;
        color: var(--tsc-red);
        padding: 4px 8px;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
      }

      .mission-moment span {
        min-width: 0;
      }

      @media (max-width: 760px) {
        .mission-moment {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Workspace navigation">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">TS</span>
          <div>
            <p>Tractor Supply</p>
            <h1>Hoop's Cart and Checkout PM Workbench</h1>
          </div>
        </div>

        <nav class="mode-nav" aria-label="Views">
          <button type="button" data-view="overview" class="active">Overview</button>
          <button type="button" data-view="captures">Captures</button>
          <button type="button" data-view="matrix">Feature Matrix</button>
          <button type="button" data-view="reports">Reports</button>
        </nav>

        <div class="sidebar-section">
          <div class="sidebar-heading">
            <span>Retailers</span>
            <button type="button" class="icon-button" id="resetOrderButton" title="Reset retailer order" aria-label="Reset retailer order">R</button>
          </div>
          <div class="retailer-list" id="retailerList"></div>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-title">
            <p class="eyebrow">Cart and checkout competitive monitoring</p>
            <h2 id="pageHeading">PM command center</h2>
            <div class="mission-moment" aria-live="polite">
              <strong>Have fun</strong>
              <span id="missionJoke">Retail comparison mode: engaged.</span>
            </div>
          </div>
          <div class="topbar-actions">
            <label class="secondary-action" id="importButton" for="importFile" style="cursor:pointer">Import</label>
            <input id="importFile" type="file" accept="application/json" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
            <button type="button" class="secondary-action" id="exportButton">Export</button>
          </div>
        </header>

        <section id="viewShell" class="view-shell" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="data.js"></script>
    <script src="automated-captures.js"></script>
    <script src="views.js"></script>
    <script src="app.js"></script>
  </body>
</html>
